<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario · Diseño</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap');

  :root {
    --bg: #F2F2F7;
    --surface: rgba(255,255,255,0.72);
    --surface-solid: #ffffff;
    --surface-hover: rgba(255,255,255,0.9);
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.14);
    --text-primary: #1C1C1E;
    --text-secondary: #6C6C70;
    --text-tertiary: #AEAEB2;
    --accent: #0071E3;
    --accent-hover: #0077ED;

    /* Categorías */
    --borja: #FF453A;
    --borja-soft: rgba(255,69,58,0.12);
    --pablo: #BF5AF2;
    --pablo-soft: rgba(191,90,242,0.12);
    --compensacion: #32ADE6;
    --compensacion-soft: rgba(50,173,230,0.12);
    --cumple: #FF9F0A;
    --cumple-soft: rgba(255,159,10,0.12);
    --festivo: #30D158;
    --festivo-soft: rgba(48,209,88,0.12);

    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --radius-xl: 28px;

    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
    --shadow-xl: 0 24px 64px rgba(0,0,0,0.16), 0 8px 24px rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { font-size: 16px; }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── LOGIN SCREEN ─── */
  #login-screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    z-index: 1000;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  #login-screen.hidden {
    opacity: 0; transform: scale(0.96) translateY(-8px); pointer-events: none;
  }

  .login-card {
    background: var(--surface-solid);
    border-radius: var(--radius-xl);
    padding: 48px 40px 40px;
    width: 360px;
    box-shadow: var(--shadow-xl);
    border: 1px solid var(--border);
    text-align: center;
  }

  .login-logo {
    width: 56px; height: 56px;
    background: var(--text-primary);
    border-radius: 16px;
    margin: 0 auto 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }

  .login-title {
    font-size: 22px; font-weight: 600;
    letter-spacing: -0.4px;
    margin-bottom: 6px;
  }

  .login-subtitle {
    font-size: 14px; color: var(--text-secondary);
    margin-bottom: 32px; font-weight: 400;
  }

  .user-cards {
    display: flex; flex-direction: column; gap: 10px;
  }

  .user-btn {
    padding: 16px 20px;
    border-radius: var(--radius-md);
    border: 1.5px solid var(--border-strong);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; gap: 14px;
    transition: all 0.18s ease;
    font-family: inherit;
    text-align: left;
  }
  .user-btn:hover {
    background: var(--surface-hover);
    border-color: transparent;
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }
  .user-btn:active { transform: translateY(0); }

  .user-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 16px; color: #fff; flex-shrink: 0;
  }
  .user-avatar.borja { background: var(--borja); }
  .user-avatar.pablo { background: var(--pablo); }

  .user-info { flex: 1; }
  .user-name { font-size: 16px; font-weight: 500; letter-spacing: -0.2px; }
  .user-role { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }

  .user-arrow { color: var(--text-tertiary); font-size: 14px; }

  /* ─── APP LAYOUT ─── */
  #app { display: none; min-height: 100vh; flex-direction: column; }
  #app.visible { display: flex; }

  /* ─── TOPBAR ─── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(242,242,247,0.82);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .topbar-left { display: flex; align-items: center; gap: 10px; }

  .topbar-logo {
    width: 28px; height: 28px;
    background: var(--text-primary);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }

  .topbar-title {
    font-size: 15px; font-weight: 600;
    letter-spacing: -0.3px;
  }

  .topbar-right { display: flex; align-items: center; gap: 12px; }

  .view-toggle {
    display: flex;
    background: rgba(0,0,0,0.06);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }
  .view-btn {
    padding: 5px 12px;
    border-radius: 6px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 12px; font-weight: 500;
    color: var(--text-secondary);
    font-family: inherit;
    transition: all 0.15s ease;
  }
  .view-btn.active {
    background: var(--surface-solid);
    color: var(--text-primary);
    box-shadow: var(--shadow-sm);
  }

  .user-chip {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface-solid);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px 4px 6px;
    cursor: pointer;
    transition: all 0.15s ease;
    box-shadow: var(--shadow-sm);
  }
  .user-chip:hover { box-shadow: var(--shadow-md); }

  .chip-avatar {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: #fff;
  }
  .chip-avatar.borja { background: var(--borja); }
  .chip-avatar.pablo { background: var(--pablo); }
  .chip-name { font-size: 13px; font-weight: 500; }

  /* ─── MAIN CONTENT ─── */
  .main {
    flex: 1;
    padding: 24px;
    max-width: 1280px;
    width: 100%;
    margin: 0 auto;
  }

  /* ─── YEAR NAV ─── */
  .year-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }

  .year-display {
    font-size: 28px; font-weight: 600; letter-spacing: -0.8px;
  }

  .year-controls { display: flex; gap: 6px; }
  .year-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--border-strong);
    background: var(--surface-solid);
    cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s ease;
    box-shadow: var(--shadow-sm);
    color: var(--text-primary);
  }
  .year-btn:hover { box-shadow: var(--shadow-md); transform: scale(1.05); }

  /* ─── LEGEND ─── */
  .legend {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 20px;
  }

  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-secondary);
    background: var(--surface-solid);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    box-shadow: var(--shadow-sm);
  }
  .legend-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }

  /* ─── GRID VIEW ─── */
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }

  @media (max-width: 1100px) { .calendar-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 800px)  { .calendar-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 500px)  { .calendar-grid { grid-template-columns: 1fr; } }

  /* ─── MONTH CARD ─── */
  .month-card {
    background: var(--surface-solid);
    border-radius: var(--radius-lg);
    padding: 16px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
    transition: box-shadow 0.2s ease;
  }
  .month-card:hover { box-shadow: var(--shadow-md); }

  .month-header {
    font-size: 14px; font-weight: 600;
    letter-spacing: -0.2px;
    margin-bottom: 12px;
    color: var(--text-primary);
  }

  .cal-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    margin-bottom: 4px;
  }
  .cal-weekday {
    text-align: center;
    font-size: 10px; font-weight: 500;
    color: var(--text-tertiary);
    padding: 2px 0;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .cal-days {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 1px;
  }

  .cal-day {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 400;
    border-radius: 50%;
    cursor: pointer;
    position: relative;
    transition: all 0.12s ease;
    color: var(--text-primary);
    -webkit-user-select: none; user-select: none;
  }

  .cal-day:not(.empty):not(.festivo):hover {
    background: rgba(0,0,0,0.06);
  }

  .cal-day.empty { cursor: default; }

  .cal-day.today {
    font-weight: 600;
    color: var(--accent);
  }
  .cal-day.today::after {
    content: '';
    position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%);
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--accent);
  }

  .cal-day.weekend:not([class*="cat-"]) {
    color: var(--text-tertiary);
  }

  /* Category styles */
  .cal-day.cat-borja      { background: var(--borja);        color: #fff; }
  .cal-day.cat-pablo      { background: var(--pablo);        color: #fff; }
  .cal-day.cat-comp       { background: var(--compensacion); color: #fff; }
  .cal-day.cat-cumple     { background: var(--cumple);       color: #fff; }
  .cal-day.cat-festivo    { background: var(--festivo-soft); color: #1a7a3a; cursor: default; }

  /* Multi-user dots */
  .day-dots {
    position: absolute; bottom: 1px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 2px;
  }
  .day-dot {
    width: 3px; height: 3px; border-radius: 50%;
  }

  /* ─── MODAL / DAY PICKER ─── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(4px);
    z-index: 500;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .modal-overlay.open {
    opacity: 1; pointer-events: all;
  }

  .modal {
    background: var(--surface-solid);
    border-radius: var(--radius-xl);
    padding: 28px;
    width: 320px;
    box-shadow: var(--shadow-xl);
    border: 1px solid var(--border);
    transform: scale(0.94) translateY(8px);
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .modal-overlay.open .modal {
    transform: scale(1) translateY(0);
  }

  .modal-date {
    font-size: 13px; font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }
  .modal-title {
    font-size: 20px; font-weight: 600; letter-spacing: -0.4px;
    margin-bottom: 20px;
  }

  .cat-options { display: flex; flex-direction: column; gap: 8px; }

  .cat-option {
    padding: 12px 14px;
    border-radius: var(--radius-md);
    border: 1.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-family: inherit;
    display: flex; align-items: center; gap: 12px;
    transition: all 0.15s ease;
    text-align: left;
  }
  .cat-option:hover { border-color: transparent; box-shadow: var(--shadow-md); transform: translateX(2px); }
  .cat-option.active { border-color: transparent; }

  .cat-option.opt-borja.active      { background: var(--borja-soft);        border-color: var(--borja); }
  .cat-option.opt-pablo.active      { background: var(--pablo-soft);        border-color: var(--pablo); }
  .cat-option.opt-comp.active       { background: var(--compensacion-soft); border-color: var(--compensacion); }
  .cat-option.opt-cumple.active     { background: var(--cumple-soft);       border-color: var(--cumple); }

  .cat-dot-lg {
    width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
  }
  .cat-label { font-size: 14px; font-weight: 500; }
  .cat-sub   { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }

  .modal-actions {
    display: flex; gap: 8px; margin-top: 16px;
  }
  .btn-secondary {
    flex: 1; padding: 11px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-strong);
    background: transparent;
    cursor: pointer; font-family: inherit;
    font-size: 14px; font-weight: 500;
    color: var(--text-primary);
    transition: all 0.15s ease;
  }
  .btn-secondary:hover { background: rgba(0,0,0,0.04); }

  .btn-danger {
    flex: 1; padding: 11px;
    border-radius: var(--radius-md);
    border: none;
    background: rgba(255,69,58,0.1);
    color: var(--borja);
    cursor: pointer; font-family: inherit;
    font-size: 14px; font-weight: 500;
    transition: all 0.15s ease;
    display: none;
  }
  .btn-danger.show { display: block; }
  .btn-danger:hover { background: rgba(255,69,58,0.18); }

  .btn-primary {
    flex: 1; padding: 11px;
    border-radius: var(--radius-md);
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer; font-family: inherit;
    font-size: 14px; font-weight: 500;
    transition: all 0.15s ease;
  }
  .btn-primary:hover { background: var(--accent-hover); }

  /* ─── LIST VIEW ─── */
  .list-view { display: none; }
  .list-view.active { display: block; }
  .grid-view { display: grid; }
  .grid-view.hidden { display: none; }

  .list-month { margin-bottom: 20px; }
  .list-month-title {
    font-size: 13px; font-weight: 600; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 8px; padding: 0 2px;
  }

  .list-event {
    background: var(--surface-solid);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 12px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.15s ease;
  }
  .list-event:hover { box-shadow: var(--shadow-md); }

  .list-event-color {
    width: 4px; height: 36px; border-radius: 2px; flex-shrink: 0;
  }
  .list-event-date { font-size: 13px; font-weight: 600; min-width: 52px; }
  .list-event-label { font-size: 14px; font-weight: 500; }
  .list-event-user { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
  .list-event-empty {
    text-align: center; color: var(--text-tertiary);
    font-size: 14px; padding: 32px;
  }

  /* ─── STATS ─── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }

  @media (max-width: 700px) { .stats-bar { grid-template-columns: repeat(2, 1fr); } }

  .stat-card {
    background: var(--surface-solid);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .stat-label {
    font-size: 11px; font-weight: 500; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px;
  }
  .stat-value { font-size: 22px; font-weight: 600; letter-spacing: -0.6px; }
  .stat-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }

  /* ─── TOAST ─── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(16px);
    background: var(--text-primary);
    color: #fff;
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 13px; font-weight: 500;
    opacity: 0;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 9999;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1; transform: translateX(-50%) translateY(0);
  }

  /* ─── FESTIVO BADGE ─── */
  .festivo-badge {
    display: inline-block;
    font-size: 10px; font-weight: 500;
    background: var(--festivo-soft);
    color: #1a7a3a;
    border-radius: 4px;
    padding: 1px 5px;
    margin-left: 4px;
    vertical-align: middle;
  }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }

</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">📅</div>
    <div class="login-title">Calendario Diseño</div>
    <div class="login-subtitle">Selecciona tu perfil para continuar</div>
    <div class="user-cards">
      <button class="user-btn" onclick="login('borja')">
        <div class="user-avatar borja">B</div>
        <div class="user-info">
          <div class="user-name">Borja</div>
          <div class="user-role">Diseñador</div>
        </div>
        <span class="user-arrow">›</span>
      </button>
      <button class="user-btn" onclick="login('pablo')">
        <div class="user-avatar pablo">P</div>
        <div class="user-info">
          <div class="user-name">Pablo</div>
          <div class="user-role">Diseñador</div>
        </div>
        <span class="user-arrow">›</span>
      </button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">📅</div>
      <span class="topbar-title">Calendario Diseño</span>
    </div>
    <div class="topbar-right">
      <div class="view-toggle">
        <button class="view-btn active" onclick="setView('grid')" id="btn-grid">Cuadrícula</button>
        <button class="view-btn" onclick="setView('list')" id="btn-list">Lista</button>
      </div>
      <div class="user-chip" onclick="logout()">
        <div class="chip-avatar" id="chip-avatar">B</div>
        <span class="chip-name" id="chip-name">Borja</span>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <!-- Year Nav -->
    <div class="year-nav">
      <div class="year-display" id="year-display">2026</div>
      <div class="year-controls">
        <button class="year-btn" onclick="changeYear(-1)">‹</button>
        <button class="year-btn" onclick="changeYear(1)">›</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-bar" id="stats-bar"></div>

    <!-- Legend -->
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--borja)"></div>Vacaciones Borja</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--pablo)"></div>Vacaciones Pablo</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--compensacion)"></div>Compensación horaria</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--cumple)"></div>Cumpleaños</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--festivo)"></div>Festivo</div>
    </div>

    <!-- Grid View -->
    <div class="calendar-grid grid-view" id="calendar-grid"></div>

    <!-- List View -->
    <div class="list-view" id="list-view"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-date" id="modal-date"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="cat-options" id="cat-options"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModalDirect()">Cancelar</button>
      <button class="btn-danger" id="btn-delete" onclick="deleteEntry()">Eliminar</button>
      <button class="btn-primary" onclick="saveEntry()">Guardar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let currentUser = null;
let currentYear = 2026;
let currentView = 'grid';
let selectedDate = null;
let selectedCat = null;
let entries = {}; // { "YYYY-MM-DD": { borja?: cat, pablo?: cat } }

// ═══════════════════════════════════════════════════════
// FESTIVOS ESPAÑA + COMUNIDAD DE MADRID
// ═══════════════════════════════════════════════════════
function getFestivos(year) {
  // Calcular Pascua (algoritmo de Meeus/Jones/Butcher)
  const a = year % 19;
  const b = Math.floor(year / 100);
  const c = year % 100;
  const d = Math.floor(b / 4);
  const e = b % 4;
  const f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3);
  const h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4);
  const k = c % 4;
  const l = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * l) / 451);
  const month = Math.floor((h + l - 7 * m + 114) / 31);
  const day = ((h + l - 7 * m + 114) % 31) + 1;
  const pascua = new Date(year, month - 1, day);

  const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate() + n); return r; };
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

  const viernesSanto = addDays(pascua, -2);
  const jueveSanto   = addDays(pascua, -3);

  const festivos = {
    // Nacionales fijos
    [`${year}-01-01`]: "Año Nuevo",
    [`${year}-01-06`]: "Reyes Magos",
    [`${year}-05-01`]: "Día del Trabajo",
    [`${year}-08-15`]: "Asunción de la Virgen",
    [`${year}-10-12`]: "Fiesta Nacional",
    [`${year}-11-01`]: "Todos los Santos",
    [`${year}-12-06`]: "Día de la Constitución",
    [`${year}-12-08`]: "Inmaculada Concepción",
    [`${year}-12-25`]: "Navidad",
    // Semana Santa
    [fmt(jueveSanto)]:   "Jueves Santo",
    [fmt(viernesSanto)]: "Viernes Santo",
    // Comunidad de Madrid
    [`${year}-03-28`]: "30 de Marzo (Madrid)", // placeholder — se recalcula abajo
    [`${year}-05-02`]: "Fiesta de la Comunidad de Madrid",
    [`${year}-07-25`]: "Santiago Apóstol",
  };

  // Quitar el placeholder y poner Lunes de Pascua de Madrid
  delete festivos[`${year}-03-28`];
  const lunesPascua = addDays(pascua, 1);
  festivos[fmt(lunesPascua)] = "Lunes de Pascua (Madrid)";

  // Ciudad de Madrid (municipales)
  festivos[`${year}-11-09`] = "Almudena (Madrid capital)";

  return festivos;
}

// ═══════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════
function saveData() {
  localStorage.setItem('cal_entries', JSON.stringify(entries));
}
function loadData() {
  const raw = localStorage.getItem('cal_entries');
  if (raw) entries = JSON.parse(raw);
}

// ═══════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════
function login(user) {
  currentUser = user;
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  document.getElementById('chip-avatar').textContent = user === 'borja' ? 'B' : 'P';
  document.getElementById('chip-avatar').className = `chip-avatar ${user}`;
  document.getElementById('chip-name').textContent = user === 'borja' ? 'Borja' : 'Pablo';
  renderAll();
}

function logout() {
  currentUser = null;
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').classList.remove('visible');
}

// ═══════════════════════════════════════════════════════
// VIEW
// ═══════════════════════════════════════════════════════
function setView(v) {
  currentView = v;
  document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
  document.getElementById('btn-list').classList.toggle('active', v === 'list');
  document.getElementById('calendar-grid').classList.toggle('hidden', v !== 'grid');
  document.getElementById('list-view').classList.toggle('active', v === 'list');
  if (v === 'list') renderListView();
}

function changeYear(delta) {
  currentYear += delta;
  document.getElementById('year-display').textContent = currentYear;
  renderAll();
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS_ES   = ['L','M','X','J','V','S','D'];
const DAYS_LONG = ['lunes','martes','miércoles','jueves','viernes','sábado','domingo'];

function renderAll() {
  renderStats();
  renderGridView();
  if (currentView === 'list') renderListView();
}

function renderStats() {
  const festivos = getFestivos(currentYear);
  let bVac = 0, pVac = 0, bComp = 0, pComp = 0;
  for (const [date, cats] of Object.entries(entries)) {
    if (!date.startsWith(currentYear)) continue;
    if (cats.borja === 'borja') bVac++;
    if (cats.pablo === 'pablo') pVac++;
    if (cats.borja === 'comp' || cats.pablo === 'comp') {
      if (cats.borja === 'comp') bComp++;
      if (cats.pablo === 'comp') pComp++;
    }
  }
  const fCount = Object.keys(festivos).filter(d => d.startsWith(currentYear)).length;

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Vacaciones Borja</div>
      <div class="stat-value" style="color:var(--borja)">${bVac}</div>
      <div class="stat-sub">días en ${currentYear}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Vacaciones Pablo</div>
      <div class="stat-value" style="color:var(--pablo)">${pVac}</div>
      <div class="stat-sub">días en ${currentYear}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Compensación</div>
      <div class="stat-value" style="color:var(--compensacion)">${bComp + pComp}</div>
      <div class="stat-sub">días totales</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Festivos</div>
      <div class="stat-value" style="color:var(--festivo)">${fCount}</div>
      <div class="stat-sub">España + Madrid</div>
    </div>
  `;
}

function renderGridView() {
  const grid = document.getElementById('calendar-grid');
  const festivos = getFestivos(currentYear);
  const today = new Date();
  grid.innerHTML = '';

  for (let m = 0; m < 12; m++) {
    const card = document.createElement('div');
    card.className = 'month-card';

    // Header
    const header = document.createElement('div');
    header.className = 'month-header';
    header.textContent = MONTHS_ES[m];
    card.appendChild(header);

    // Weekday labels (L M X J V S D)
    const weekdays = document.createElement('div');
    weekdays.className = 'cal-weekdays';
    DAYS_ES.forEach(d => {
      const wd = document.createElement('div');
      wd.className = 'cal-weekday';
      wd.textContent = d;
      weekdays.appendChild(wd);
    });
    card.appendChild(weekdays);

    // Days
    const daysEl = document.createElement('div');
    daysEl.className = 'cal-days';

    // First day of month (0=Sun..6=Sat → convert to Mon-based)
    const firstDay = new Date(currentYear, m, 1).getDay();
    const offset = (firstDay + 6) % 7; // Mon=0
    const daysInMonth = new Date(currentYear, m + 1, 0).getDate();

    for (let i = 0; i < offset; i++) {
      const empty = document.createElement('div');
      empty.className = 'cal-day empty';
      daysEl.appendChild(empty);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${currentYear}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayEl = document.createElement('div');
      dayEl.className = 'cal-day';

      const dow = new Date(currentYear, m, d).getDay(); // 0=Sun,6=Sat
      if (dow === 0 || dow === 6) dayEl.classList.add('weekend');

      // Today
      if (d === today.getDate() && m === today.getMonth() && currentYear === today.getFullYear()) {
        dayEl.classList.add('today');
      }

      // Festivo
      if (festivos[dateStr]) {
        dayEl.classList.add('cat-festivo');
        dayEl.title = festivos[dateStr];
      }

      // User entries
      const entry = entries[dateStr] || {};
      const cats = [entry.borja, entry.pablo].filter(Boolean);

      if (!festivos[dateStr]) {
        // Determine primary display
        // If current user has an entry, show it prominently
        const myCat = entry[currentUser];
        if (myCat) {
          dayEl.classList.add(`cat-${myCat}`);
        }

        // Show dots for both users
        const dots = [];
        if (entry.borja) dots.push({ color: catColor(entry.borja) });
        if (entry.pablo) dots.push({ color: catColor(entry.pablo) });

        if (dots.length > 0 && !myCat) {
          // Someone else has entry, show as soft background
          const otherUser = entry.borja ? 'borja' : 'pablo';
          const otherCat = entry.borja || entry.pablo;
          dayEl.style.background = catSoftColor(otherCat);
        }

        // Multi-user indicator dots
        if (entry.borja && entry.pablo) {
          const dotsEl = document.createElement('div');
          dotsEl.className = 'day-dots';
          [
            { color: catColor(entry.borja) },
            { color: catColor(entry.pablo) }
          ].forEach(dot => {
            const d2 = document.createElement('div');
            d2.className = 'day-dot';
            d2.style.background = dot.color;
            dotsEl.appendChild(d2);
          });
          dayEl.appendChild(dotsEl);
        }

        if (!festivos[dateStr]) {
          dayEl.addEventListener('click', () => openModal(dateStr, d, m));
        }
      }

      dayEl.insertAdjacentText('afterbegin', d);
      daysEl.appendChild(dayEl);
    }

    card.appendChild(daysEl);
    grid.appendChild(card);
  }
}

function renderListView() {
  const list = document.getElementById('list-view');
  const festivos = getFestivos(currentYear);
  list.innerHTML = '';

  for (let m = 0; m < 12; m++) {
    const daysInMonth = new Date(currentYear, m + 1, 0).getDate();
    const monthEvents = [];

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${currentYear}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const entry = entries[dateStr] || {};
      const dow = new Date(currentYear, m, d).getDay();
      const dayLabel = `${d} ${MONTHS_ES[m].slice(0,3)}`;

      if (festivos[dateStr]) {
        monthEvents.push({ dateStr, dayLabel, cat: 'festivo', label: festivos[dateStr], user: null });
      }
      if (entry.borja) {
        monthEvents.push({ dateStr, dayLabel, cat: entry.borja, label: catName(entry.borja), user: 'Borja' });
      }
      if (entry.pablo) {
        monthEvents.push({ dateStr, dayLabel, cat: entry.pablo, label: catName(entry.pablo), user: 'Pablo' });
      }
    }

    if (monthEvents.length === 0) return;

    const section = document.createElement('div');
    section.className = 'list-month';
    section.innerHTML = `<div class="list-month-title">${MONTHS_ES[m]}</div>`;

    monthEvents.forEach(ev => {
      const row = document.createElement('div');
      row.className = 'list-event';
      row.innerHTML = `
        <div class="list-event-color" style="background:${catColor(ev.cat)}"></div>
        <div class="list-event-date">${ev.dayLabel}</div>
        <div>
          <div class="list-event-label">${ev.label}</div>
          ${ev.user ? `<div class="list-event-user">${ev.user}</div>` : `<div class="list-event-user" style="color:var(--festivo)">Festivo oficial</div>`}
        </div>
      `;
      section.appendChild(row);
    });

    list.appendChild(section);
  }

  if (!list.innerHTML) {
    list.innerHTML = `<div class="list-event-empty">No hay eventos registrados en ${currentYear}</div>`;
  }
}

// ═══════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════
function openModal(dateStr, day, month) {
  selectedDate = dateStr;
  selectedCat = null;
  const entry = entries[dateStr] || {};
  const existing = entry[currentUser];

  const modalDate = document.getElementById('modal-date');
  const modalTitle = document.getElementById('modal-title');
  const opts = document.getElementById('cat-options');
  const btnDelete = document.getElementById('btn-delete');

  const dow = new Date(currentYear, month, day).getDay();
  const dowName = DAYS_LONG[(dow + 6) % 7];
  modalDate.textContent = `${dowName}, ${day} de ${MONTHS_ES[month]} de ${currentYear}`;
  modalTitle.textContent = 'Añadir evento';

  // Categories available based on current user
  const cats = [];
  if (currentUser === 'borja') cats.push({ id: 'borja', label: 'Vacaciones Borja', sub: 'Días de vacaciones' });
  if (currentUser === 'pablo') cats.push({ id: 'pablo', label: 'Vacaciones Pablo', sub: 'Días de vacaciones' });
  cats.push({ id: 'comp', label: 'Compensación horaria', sub: 'Horas compensadas' });
  cats.push({ id: 'cumple', label: 'Cumpleaños', sub: 'Recordatorio anual' });

  opts.innerHTML = '';
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = `cat-option opt-${cat.id}`;
    if (existing === cat.id) {
      btn.classList.add('active');
      selectedCat = cat.id;
    }
    btn.innerHTML = `
      <div class="cat-dot-lg" style="background:${catColor(cat.id)}"></div>
      <div>
        <div class="cat-label">${cat.label}</div>
        <div class="cat-sub">${cat.sub}</div>
      </div>
    `;
    btn.addEventListener('click', () => {
      opts.querySelectorAll('.cat-option').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedCat = cat.id;
    });
    opts.appendChild(btn);
  });

  btnDelete.classList.toggle('show', !!existing);

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
  selectedDate = null; selectedCat = null;
}

function saveEntry() {
  if (!selectedDate || !selectedCat) {
    showToast('Selecciona una categoría');
    return;
  }
  if (!entries[selectedDate]) entries[selectedDate] = {};
  entries[selectedDate][currentUser] = selectedCat;
  saveData();
  closeModalDirect();
  renderAll();
  showToast('✓ Evento guardado');
}

function deleteEntry() {
  if (!selectedDate) return;
  if (entries[selectedDate]) {
    delete entries[selectedDate][currentUser];
    if (Object.keys(entries[selectedDate]).length === 0) delete entries[selectedDate];
  }
  saveData();
  closeModalDirect();
  renderAll();
  showToast('Evento eliminado');
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function catColor(cat) {
  const map = {
    borja: '#FF453A', pablo: '#BF5AF2',
    comp: '#32ADE6', cumple: '#FF9F0A', festivo: '#30D158'
  };
  return map[cat] || '#999';
}

function catSoftColor(cat) {
  const map = {
    borja: 'rgba(255,69,58,0.1)', pablo: 'rgba(191,90,242,0.1)',
    comp: 'rgba(50,173,230,0.1)', cumple: 'rgba(255,159,10,0.1)'
  };
  return map[cat] || 'transparent';
}

function catName(cat) {
  const map = {
    borja: 'Vacaciones Borja', pablo: 'Vacaciones Pablo',
    comp: 'Compensación horaria', cumple: 'Cumpleaños', festivo: 'Festivo'
  };
  return map[cat] || cat;
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2400);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
loadData();
</script>
