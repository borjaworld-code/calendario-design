<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario · Diseño</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap');

  :root {
    --bg: #F2F2F7;
    --surface-solid: #ffffff;
    --surface-hover: rgba(255,255,255,0.9);
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.14);
    --text-primary: #1C1C1E;
    --text-secondary: #6C6C70;
    --text-tertiary: #AEAEB2;
    --accent: #0071E3;
    --accent-hover: #0077ED;
    --borja: #FF453A;
    --borja-soft: rgba(255,69,58,0.12);
    --pablo: #BF5AF2;
    --pablo-soft: rgba(191,90,242,0.12);
    --compensacion: #32ADE6;
    --compensacion-soft: rgba(50,173,230,0.12);
    --cumple: #FF9F0A;
    --cumple-soft: rgba(255,159,10,0.12);
    --festivo: #30D158;
    --festivo-soft: rgba(48,209,88,0.12);
    --radius-md: 14px;
    --radius-lg: 20px;
    --radius-xl: 28px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.04);
    --shadow-xl: 0 24px 64px rgba(0,0,0,0.16),0 8px 24px rgba(0,0,0,0.08);
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;overflow-x:hidden;}

  /* LOADING */
  .loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000;gap:16px;transition:opacity .3s ease;}
  .loading-overlay.hidden{opacity:0;pointer-events:none;}
  .spinner{width:32px;height:32px;border:3px solid var(--border-strong);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-size:14px;color:var(--text-secondary);font-weight:500;}

  /* LOGIN */
  #login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:1000;transition:opacity .4s ease,transform .4s ease;}
  #login-screen.hidden{opacity:0;transform:scale(.96) translateY(-8px);pointer-events:none;}
  .login-card{background:var(--surface-solid);border-radius:var(--radius-xl);padding:48px 40px 40px;width:360px;box-shadow:var(--shadow-xl);border:1px solid var(--border);text-align:center;}
  .login-logo{width:56px;height:56px;background:var(--text-primary);border-radius:16px;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;font-size:24px;}
  .login-title{font-size:22px;font-weight:600;letter-spacing:-.4px;margin-bottom:6px;}
  .login-subtitle{font-size:14px;color:var(--text-secondary);margin-bottom:32px;}
  .user-cards{display:flex;flex-direction:column;gap:10px;}
  .user-btn{padding:16px 20px;border-radius:var(--radius-md);border:1.5px solid var(--border-strong);background:transparent;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .18s ease;font-family:inherit;text-align:left;}
  .user-btn:hover{background:var(--surface-hover);border-color:transparent;box-shadow:var(--shadow-md);transform:translateY(-1px);}
  .user-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;color:#fff;flex-shrink:0;}
  .user-avatar.borja{background:var(--borja);}
  .user-avatar.pablo{background:var(--pablo);}
  .user-info{flex:1;}
  .user-name{font-size:16px;font-weight:500;letter-spacing:-.2px;}
  .user-role{font-size:12px;color:var(--text-secondary);margin-top:1px;}
  .user-arrow{color:var(--text-tertiary);font-size:14px;}

  /* SYNC */
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--festivo);display:inline-block;margin-right:5px;animation:pulse 2s infinite;}
  .sync-dot.offline{background:var(--borja);animation:none;}
  .sync-dot.syncing{background:var(--cumple);animation:none;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  .sync-label{font-size:11px;color:var(--text-secondary);display:flex;align-items:center;}

  /* APP */
  #app{display:none;min-height:100vh;flex-direction:column;}
  #app.visible{display:flex;}

  /* TOPBAR */
  .topbar{position:sticky;top:0;z-index:100;background:rgba(242,242,247,.82);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;}
  .topbar-left{display:flex;align-items:center;gap:10px;}
  .topbar-logo{width:28px;height:28px;background:var(--text-primary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;}
  .topbar-title{font-size:15px;font-weight:600;letter-spacing:-.3px;}
  .topbar-right{display:flex;align-items:center;gap:12px;}
  .view-toggle{display:flex;background:rgba(0,0,0,.06);border-radius:8px;padding:3px;gap:2px;}
  .view-btn{padding:5px 12px;border-radius:6px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:500;color:var(--text-secondary);font-family:inherit;transition:all .15s ease;}
  .view-btn.active{background:var(--surface-solid);color:var(--text-primary);box-shadow:var(--shadow-sm);}
  .user-chip{display:flex;align-items:center;gap:8px;background:var(--surface-solid);border:1px solid var(--border);border-radius:20px;padding:4px 12px 4px 6px;cursor:pointer;transition:all .15s ease;box-shadow:var(--shadow-sm);}
  .user-chip:hover{box-shadow:var(--shadow-md);}
  .chip-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;}
  .chip-avatar.borja{background:var(--borja);}
  .chip-avatar.pablo{background:var(--pablo);}
  .chip-name{font-size:13px;font-weight:500;}

  /* MAIN */
  .main{flex:1;padding:24px;max-width:1280px;width:100%;margin:0 auto;}
  .year-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .year-display{font-size:28px;font-weight:600;letter-spacing:-.8px;}
  .year-controls{display:flex;gap:6px;align-items:center;}
  .year-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border-strong);background:var(--surface-solid);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s ease;box-shadow:var(--shadow-sm);color:var(--text-primary);}
  .year-btn:hover{box-shadow:var(--shadow-md);transform:scale(1.05);}

  /* STATS */
  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
  @media(max-width:700px){.stats-bar{grid-template-columns:repeat(2,1fr);}}
  .stat-card{background:var(--surface-solid);border-radius:var(--radius-md);padding:14px 16px;border:1px solid var(--border);box-shadow:var(--shadow-sm);}
  .stat-label{font-size:11px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
  .stat-value{font-size:22px;font-weight:600;letter-spacing:-.6px;}
  .stat-sub{font-size:11px;color:var(--text-tertiary);margin-top:2px;}

  /* LEGEND */
  .legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary);background:var(--surface-solid);border:1px solid var(--border);border-radius:20px;padding:4px 10px;box-shadow:var(--shadow-sm);}
  .legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

  /* CALENDAR GRID */
  .calendar-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  @media(max-width:1100px){.calendar-grid{grid-template-columns:repeat(3,1fr);}}
  @media(max-width:800px){.calendar-grid{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:500px){.calendar-grid{grid-template-columns:1fr;}}
  .calendar-grid.hidden{display:none;}

  .month-card{background:var(--surface-solid);border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow-sm);border:1px solid var(--border);transition:box-shadow .2s ease;}
  .month-card:hover{box-shadow:var(--shadow-md);}
  .month-header{font-size:14px;font-weight:600;letter-spacing:-.2px;margin-bottom:12px;}
  .cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
  .cal-weekday{text-align:center;font-size:10px;font-weight:500;color:var(--text-tertiary);padding:2px 0;letter-spacing:.3px;text-transform:uppercase;}
  .cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
  .cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:400;border-radius:50%;cursor:pointer;position:relative;transition:all .12s ease;color:var(--text-primary);-webkit-user-select:none;user-select:none;}
  .cal-day:not(.empty):not(.festivo):hover{background:rgba(0,0,0,.06);}
  .cal-day.empty{cursor:default;}
  .cal-day.today{font-weight:600;color:var(--accent);}
  .cal-day.today::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent);}
  .cal-day.weekend:not([class*="cat-"]){color:var(--text-tertiary);}
  .cal-day.cat-borja{background:var(--borja);color:#fff;}
  .cal-day.cat-pablo{background:var(--pablo);color:#fff;}
  .cal-day.cat-comp{background:var(--compensacion);color:#fff;}
  .cal-day.cat-cumple{background:var(--cumple);color:#fff;}
  .cal-day.cat-festivo{background:var(--festivo-soft);color:#1a7a3a;cursor:default;}
  .cal-day.cat-other-borja{background:var(--borja-soft);}
  .cal-day.cat-other-pablo{background:var(--pablo-soft);}
  .cal-day.cat-other-comp{background:var(--compensacion-soft);}
  .cal-day.cat-other-cumple{background:var(--cumple-soft);}
  .day-dots{position:absolute;bottom:1px;left:50%;transform:translateX(-50%);display:flex;gap:2px;}
  .day-dot{width:3px;height:3px;border-radius:50%;}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s ease;}
  .modal-overlay.open{opacity:1;pointer-events:all;}
  .modal{background:var(--surface-solid);border-radius:var(--radius-xl);padding:28px;width:320px;box-shadow:var(--shadow-xl);border:1px solid var(--border);transform:scale(.94) translateY(8px);transition:transform .25s cubic-bezier(.34,1.56,.64,1);}
  .modal-overlay.open .modal{transform:scale(1) translateY(0);}
  .modal-date{font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:4px;}
  .modal-title{font-size:20px;font-weight:600;letter-spacing:-.4px;margin-bottom:16px;}
  .other-entry{background:var(--bg);border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:8px;}
  .other-entry-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .cat-options{display:flex;flex-direction:column;gap:8px;}
  .cat-option{padding:12px 14px;border-radius:var(--radius-md);border:1.5px solid var(--border);background:transparent;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:12px;transition:all .15s ease;text-align:left;}
  .cat-option:hover{border-color:transparent;box-shadow:var(--shadow-md);transform:translateX(2px);}
  .cat-option.active{border-color:transparent;}
  .cat-option.opt-borja.active{background:var(--borja-soft);border-color:var(--borja);}
  .cat-option.opt-pablo.active{background:var(--pablo-soft);border-color:var(--pablo);}
  .cat-option.opt-comp.active{background:var(--compensacion-soft);border-color:var(--compensacion);}
  .cat-option.opt-cumple.active{background:var(--cumple-soft);border-color:var(--cumple);}
  .cat-dot-lg{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
  .cat-label{font-size:14px;font-weight:500;}
  .cat-sub{font-size:12px;color:var(--text-secondary);margin-top:1px;}
  .modal-actions{display:flex;gap:8px;margin-top:16px;}
  .btn-secondary{flex:1;padding:11px;border-radius:var(--radius-md);border:1px solid var(--border-strong);background:transparent;cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;color:var(--text-primary);transition:all .15s ease;}
  .btn-secondary:hover{background:rgba(0,0,0,.04);}
  .btn-danger{flex:1;padding:11px;border-radius:var(--radius-md);border:none;background:rgba(255,69,58,.1);color:var(--borja);cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;transition:all .15s ease;display:none;}
  .btn-danger.show{display:block;}
  .btn-danger:hover{background:rgba(255,69,58,.18);}
  .btn-primary{flex:1;padding:11px;border-radius:var(--radius-md);border:none;background:var(--accent);color:#fff;cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;transition:all .15s ease;}
  .btn-primary:hover{background:var(--accent-hover);}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;}

  /* LIST VIEW */
  .list-view{display:none;}
  .list-view.active{display:block;}
  .list-month{margin-bottom:20px;}
  .list-month-title{font-size:13px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;padding:0 2px;}
  .list-event{background:var(--surface-solid);border-radius:var(--radius-md);padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:box-shadow .15s ease;}
  .list-event:hover{box-shadow:var(--shadow-md);}
  .list-event-color{width:4px;height:36px;border-radius:2px;flex-shrink:0;}
  .list-event-date{font-size:13px;font-weight:600;min-width:52px;}
  .list-event-label{font-size:14px;font-weight:500;}
  .list-event-user{font-size:12px;color:var(--text-secondary);margin-top:1px;}
  .list-event-empty{text-align:center;color:var(--text-tertiary);font-size:14px;padding:32px;}

  /* TOAST */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--text-primary);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all .25s cubic-bezier(.34,1.56,.64,1);z-index:9999;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:3px;}
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">Conectando…</div>
</div>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">📅</div>
    <div class="login-title">Calendario Diseño</div>
    <div class="login-subtitle">Selecciona tu perfil para continuar</div>
    <div class="user-cards">
      <button class="user-btn" onclick="login('borja')">
        <div class="user-avatar borja">B</div>
        <div class="user-info"><div class="user-name">Borja</div><div class="user-role">Diseñador</div></div>
        <span class="user-arrow">›</span>
      </button>
      <button class="user-btn" onclick="login('pablo')">
        <div class="user-avatar pablo">P</div>
        <div class="user-info"><div class="user-name">Pablo</div><div class="user-role">Diseñador</div></div>
        <span class="user-arrow">›</span>
      </button>
    </div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">📅</div>
      <span class="topbar-title">Calendario Diseño</span>
      <div class="sync-label" id="sync-label">
        <span class="sync-dot" id="sync-dot"></span>
        <span id="sync-text">En línea</span>
      </div>
    </div>
    <div class="topbar-right">
      <div class="view-toggle">
        <button class="view-btn active" onclick="setView('grid')" id="btn-grid">Cuadrícula</button>
        <button class="view-btn" onclick="setView('list')" id="btn-list">Lista</button>
      </div>
      <div class="user-chip" onclick="logout()">
        <div class="chip-avatar" id="chip-avatar">B</div>
        <span class="chip-name" id="chip-name">Borja</span>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="year-nav">
      <div class="year-display" id="year-display">2026</div>
      <div class="year-controls">
        <button class="year-btn" onclick="changeYear(-1)">‹</button>
        <button class="year-btn" onclick="changeYear(1)">›</button>
      </div>
    </div>
    <div class="stats-bar" id="stats-bar"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--borja)"></div>Vacaciones Borja</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--pablo)"></div>Vacaciones Pablo</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--compensacion)"></div>Compensación horaria</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--cumple)"></div>Cumpleaños</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--festivo)"></div>Festivo</div>
    </div>
    <div class="calendar-grid" id="calendar-grid"></div>
    <div class="list-view" id="list-view"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-date" id="modal-date"></div>
    <div class="modal-title" id="modal-title"></div>
    <div id="other-entry-display"></div>
    <div class="cat-options" id="cat-options"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModalDirect()">Cancelar</button>
      <button class="btn-danger" id="btn-delete" onclick="deleteEntry()">Eliminar</button>
      <button class="btn-primary" id="btn-save" onclick="saveEntry()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://xnpapvdqswrknzjynjir.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhucGFwdmRxc3d0a256anluamlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjQ2ODcsImV4cCI6MjA5MDQ0MDY4N30.W0Jq-spG_YeaVMfXjfZJMBXFe6yPmFTztrsGgIUq-lY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null, currentYear = 2026, currentView = 'grid';
let selectedDate = null, selectedCat = null;
let entries = {}, realtimeChannel = null;

// ── FESTIVOS ──────────────────────────────────────────
function getFestivos(year) {
  const a=year%19,b=Math.floor(year/100),c=year%100,d=Math.floor(b/4),e=b%4;
  const f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30;
  const i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451);
  const mo=Math.floor((h+l-7*m+114)/31),dy=((h+l-7*m+114)%31)+1;
  const pascua=new Date(year,mo-1,dy);
  const add=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
  const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  return {
    [`${year}-01-01`]:"Año Nuevo",
    [`${year}-01-06`]:"Reyes Magos",
    [`${year}-05-01`]:"Día del Trabajo",
    [`${year}-08-15`]:"Asunción de la Virgen",
    [`${year}-10-12`]:"Fiesta Nacional de España",
    [`${year}-11-01`]:"Todos los Santos",
    [`${year}-12-06`]:"Día de la Constitución",
    [`${year}-12-08`]:"Inmaculada Concepción",
    [`${year}-12-25`]:"Navidad",
    [fmt(add(pascua,-3))]:"Jueves Santo",
    [fmt(add(pascua,-2))]:"Viernes Santo",
    [fmt(add(pascua,1))]:"Lunes de Pascua (Madrid)",
    [`${year}-05-02`]:"Fiesta de la Comunidad de Madrid",
    [`${year}-07-25`]:"Santiago Apóstol",
    [`${year}-11-09`]:"La Almudena (Madrid capital)",
  };
}

// ── SYNC STATUS ───────────────────────────────────────
function setSyncStatus(s) {
  const dot=document.getElementById('sync-dot'), txt=document.getElementById('sync-text');
  if(s==='online') {dot.className='sync-dot';txt.textContent='En línea';}
  if(s==='syncing'){dot.className='sync-dot syncing';txt.textContent='Sincronizando…';}
  if(s==='offline'){dot.className='sync-dot offline';txt.textContent='Sin conexión';}
}

// ── SUPABASE CRUD ─────────────────────────────────────
async function loadAllEntries() {
  const {data,error}=await sb.from('entries').select('*');
  if(error){console.error(error);setSyncStatus('offline');return;}
  entries={};
  data.forEach(r=>{
    if(!entries[r.date])entries[r.date]={};
    entries[r.date][r.user_name]=r.category;
  });
  setSyncStatus('online');
}

async function upsertEntry(date,user,category) {
  setSyncStatus('syncing');
  const {error}=await sb.from('entries').upsert({date,user_name:user,category},{onConflict:'date,user_name'});
  if(error){console.error(error);showToast('❌ Error al guardar');setSyncStatus('offline');return false;}
  setSyncStatus('online');return true;
}

async function removeEntry(date,user) {
  setSyncStatus('syncing');
  const {error}=await sb.from('entries').delete().eq('date',date).eq('user_name',user);
  if(error){console.error(error);showToast('❌ Error al eliminar');setSyncStatus('offline');return false;}
  setSyncStatus('online');return true;
}

// ── REALTIME ──────────────────────────────────────────
function subscribeRealtime() {
  if(realtimeChannel) sb.removeChannel(realtimeChannel);
  realtimeChannel=sb.channel('entries-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'entries'},payload=>{
      const{eventType,new:nr,old:or}=payload;
      if(eventType==='INSERT'||eventType==='UPDATE'){
        if(!entries[nr.date])entries[nr.date]={};
        entries[nr.date][nr.user_name]=nr.category;
        if(nr.user_name!==currentUser){
          const who=nr.user_name==='borja'?'Borja':'Pablo';
          showToast(`🔄 ${who} actualizó el ${nr.date}`);
        }
      }
      if(eventType==='DELETE'){
        if(entries[or.date]){
          delete entries[or.date][or.user_name];
          if(!Object.keys(entries[or.date]).length)delete entries[or.date];
        }
      }
      renderAll();
    })
    .subscribe(s=>{
      if(s==='SUBSCRIBED')setSyncStatus('online');
      if(s==='CLOSED'||s==='CHANNEL_ERROR')setSyncStatus('offline');
    });
}

// ── AUTH ──────────────────────────────────────────────
async function login(user) {
  currentUser=user;
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').style.display='flex';
  document.getElementById('chip-avatar').textContent=user==='borja'?'B':'P';
  document.getElementById('chip-avatar').className=`chip-avatar ${user}`;
  document.getElementById('chip-name').textContent=user==='borja'?'Borja':'Pablo';
  document.getElementById('loading-overlay').classList.remove('hidden');
  await loadAllEntries();
  subscribeRealtime();
  document.getElementById('loading-overlay').classList.add('hidden');
  renderAll();
}

function logout() {
  if(realtimeChannel)sb.removeChannel(realtimeChannel);
  currentUser=null;entries={};
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').style.display='none';
}

// ── VIEW ──────────────────────────────────────────────
function setView(v) {
  currentView=v;
  document.getElementById('btn-grid').classList.toggle('active',v==='grid');
  document.getElementById('btn-list').classList.toggle('active',v==='list');
  document.getElementById('calendar-grid').classList.toggle('hidden',v!=='grid');
  document.getElementById('list-view').classList.toggle('active',v==='list');
  if(v==='list')renderListView();
}

function changeYear(d) {
  currentYear+=d;
  document.getElementById('year-display').textContent=currentYear;
  renderAll();
}

// ── RENDER ────────────────────────────────────────────
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const WDAYS=['L','M','X','J','V','S','D'];
const WLONG=['lunes','martes','miércoles','jueves','viernes','sábado','domingo'];

function renderAll(){renderStats();renderGridView();if(currentView==='list')renderListView();}

function renderStats() {
  const f=getFestivos(currentYear);
  let bV=0,pV=0,bC=0,pC=0;
  for(const[date,cats]of Object.entries(entries)){
    if(!date.startsWith(currentYear))continue;
    if(cats.borja==='borja')bV++;
    if(cats.pablo==='pablo')pV++;
    if(cats.borja==='comp')bC++;
    if(cats.pablo==='comp')pC++;
  }
  const fC=Object.keys(f).filter(d=>d.startsWith(currentYear)).length;
  document.getElementById('stats-bar').innerHTML=`
    <div class="stat-card"><div class="stat-label">Vacaciones Borja</div><div class="stat-value" style="color:var(--borja)">${bV}</div><div class="stat-sub">días en ${currentYear}</div></div>
    <div class="stat-card"><div class="stat-label">Vacaciones Pablo</div><div class="stat-value" style="color:var(--pablo)">${pV}</div><div class="stat-sub">días en ${currentYear}</div></div>
    <div class="stat-card"><div class="stat-label">Compensación</div><div class="stat-value" style="color:var(--compensacion)">${bC+pC}</div><div class="stat-sub">días totales</div></div>
    <div class="stat-card"><div class="stat-label">Festivos</div><div class="stat-value" style="color:var(--festivo)">${fC}</div><div class="stat-sub">España + Madrid</div></div>
  `;
}

function renderGridView() {
  const grid=document.getElementById('calendar-grid');
  const festivos=getFestivos(currentYear);
  const today=new Date();
  grid.innerHTML='';
  for(let m=0;m<12;m++){
    const card=document.createElement('div');card.className='month-card';
    const hdr=document.createElement('div');hdr.className='month-header';hdr.textContent=MONTHS[m];card.appendChild(hdr);
    const wds=document.createElement('div');wds.className='cal-weekdays';
    WDAYS.forEach(d=>{const wd=document.createElement('div');wd.className='cal-weekday';wd.textContent=d;wds.appendChild(wd);});
    card.appendChild(wds);
    const daysEl=document.createElement('div');daysEl.className='cal-days';
    const firstDay=new Date(currentYear,m,1).getDay();
    const offset=(firstDay+6)%7;
    const dim=new Date(currentYear,m+1,0).getDate();
    for(let i=0;i<offset;i++){const e=document.createElement('div');e.className='cal-day empty';daysEl.appendChild(e);}
    for(let d=1;d<=dim;d++){
      const dateStr=`${currentYear}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const el=document.createElement('div');el.className='cal-day';
      const dow=new Date(currentYear,m,d).getDay();
      if(dow===0||dow===6)el.classList.add('weekend');
      if(d===today.getDate()&&m===today.getMonth()&&currentYear===today.getFullYear())el.classList.add('today');
      const isFest=!!festivos[dateStr];
      if(isFest){el.classList.add('cat-festivo');el.title=festivos[dateStr];}
      const entry=entries[dateStr]||{};
      if(!isFest){
        const myCat=entry[currentUser];
        const other=currentUser==='borja'?'pablo':'borja';
        const otherCat=entry[other];
        if(myCat)el.classList.add(`cat-${myCat}`);
        else if(otherCat)el.classList.add(`cat-other-${otherCat}`);
        if(entry.borja&&entry.pablo){
          const dots=document.createElement('div');dots.className='day-dots';
          [{color:catColor(entry.borja)},{color:catColor(entry.pablo)}].forEach(dot=>{
            const d2=document.createElement('div');d2.className='day-dot';d2.style.background=dot.color;dots.appendChild(d2);
          });
          el.appendChild(dots);
        }
        el.addEventListener('click',()=>openModal(dateStr,d,m));
      }
      el.insertAdjacentText('afterbegin',d);
      daysEl.appendChild(el);
    }
    card.appendChild(daysEl);grid.appendChild(card);
  }
}

function renderListView() {
  const list=document.getElementById('list-view');
  const festivos=getFestivos(currentYear);
  list.innerHTML='';let hasAny=false;
  for(let m=0;m<12;m++){
    const dim=new Date(currentYear,m+1,0).getDate();
    const evs=[];
    for(let d=1;d<=dim;d++){
      const ds=`${currentYear}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const entry=entries[ds]||{};
      const dl=`${d} ${MONTHS[m].slice(0,3)}`;
      if(festivos[ds])evs.push({dl,cat:'festivo',label:festivos[ds],user:null});
      if(entry.borja)evs.push({dl,cat:entry.borja,label:catName(entry.borja),user:'Borja'});
      if(entry.pablo)evs.push({dl,cat:entry.pablo,label:catName(entry.pablo),user:'Pablo'});
    }
    if(!evs.length)continue;hasAny=true;
    const sec=document.createElement('div');sec.className='list-month';
    sec.innerHTML=`<div class="list-month-title">${MONTHS[m]}</div>`;
    evs.forEach(ev=>{
      const row=document.createElement('div');row.className='list-event';
      row.innerHTML=`
        <div class="list-event-color" style="background:${catColor(ev.cat)}"></div>
        <div class="list-event-date">${ev.dl}</div>
        <div><div class="list-event-label">${ev.label}</div>
        <div class="list-event-user">${ev.user??'<span style="color:var(--festivo)">Festivo oficial</span>'}</div></div>`;
      sec.appendChild(row);
    });
    list.appendChild(sec);
  }
  if(!hasAny)list.innerHTML=`<div class="list-event-empty">No hay eventos en ${currentYear}</div>`;
}

// ── MODAL ─────────────────────────────────────────────
function openModal(dateStr,day,month){
  selectedDate=dateStr;selectedCat=null;
  const entry=entries[dateStr]||{};
  const existing=entry[currentUser];
  const other=currentUser==='borja'?'pablo':'borja';
  const otherCat=entry[other];
  const dow=new Date(currentYear,month,day).getDay();
  document.getElementById('modal-date').textContent=`${WLONG[(dow+6)%7]}, ${day} de ${MONTHS[month]} de ${currentYear}`;
  document.getElementById('modal-title').textContent=existing?'Editar evento':'Añadir evento';
  const od=document.getElementById('other-entry-display');
  if(otherCat){
    const who=other==='borja'?'Borja':'Pablo';
    od.innerHTML=`<div class="other-entry"><div class="other-entry-dot" style="background:${catColor(otherCat)}"></div><span>${who} tiene: <strong>${catName(otherCat)}</strong></span></div>`;
  }else od.innerHTML='';
  const cats=[];
  if(currentUser==='borja')cats.push({id:'borja',label:'Vacaciones Borja',sub:'Días de vacaciones'});
  if(currentUser==='pablo')cats.push({id:'pablo',label:'Vacaciones Pablo',sub:'Días de vacaciones'});
  cats.push({id:'comp',label:'Compensación horaria',sub:'Horas compensadas'});
  cats.push({id:'cumple',label:'Cumpleaños',sub:'Recordatorio anual'});
  const opts=document.getElementById('cat-options');opts.innerHTML='';
  cats.forEach(cat=>{
    const btn=document.createElement('button');btn.className=`cat-option opt-${cat.id}`;
    if(existing===cat.id){btn.classList.add('active');selectedCat=cat.id;}
    btn.innerHTML=`<div class="cat-dot-lg" style="background:${catColor(cat.id)}"></div><div><div class="cat-label">${cat.label}</div><div class="cat-sub">${cat.sub}</div></div>`;
    btn.addEventListener('click',()=>{opts.querySelectorAll('.cat-option').forEach(b=>b.classList.remove('active'));btn.classList.add('active');selectedCat=cat.id;});
    opts.appendChild(btn);
  });
  document.getElementById('btn-delete').classList.toggle('show',!!existing);
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e){if(e.target===document.getElementById('modal-overlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modal-overlay').classList.remove('open');selectedDate=null;selectedCat=null;}

async function saveEntry(){
  if(!selectedDate||!selectedCat){showToast('Selecciona una categoría');return;}
  const btn=document.getElementById('btn-save');btn.disabled=true;btn.textContent='Guardando…';
  const ok=await upsertEntry(selectedDate,currentUser,selectedCat);
  btn.disabled=false;btn.textContent='Guardar';
  if(!ok)return;
  if(!entries[selectedDate])entries[selectedDate]={};
  entries[selectedDate][currentUser]=selectedCat;
  closeModalDirect();renderAll();showToast('✓ Evento guardado');
}

async function deleteEntry(){
  if(!selectedDate)return;
  const btn=document.getElementById('btn-delete');btn.disabled=true;
  const ok=await removeEntry(selectedDate,currentUser);
  btn.disabled=false;
  if(!ok)return;
  if(entries[selectedDate]){delete entries[selectedDate][currentUser];if(!Object.keys(entries[selectedDate]).length)delete entries[selectedDate];}
  closeModalDirect();renderAll();showToast('Evento eliminado');
}

// ── HELPERS ───────────────────────────────────────────
function catColor(c){return{borja:'#FF453A',pablo:'#BF5AF2',comp:'#32ADE6',cumple:'#FF9F0A',festivo:'#30D158'}[c]||'#999';}
function catName(c){return{borja:'Vacaciones Borja',pablo:'Vacaciones Pablo',comp:'Compensación horaria',cumple:'Cumpleaños',festivo:'Festivo'}[c]||c;}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

window.addEventListener('load',()=>setTimeout(()=>document.getElementById('loading-overlay').classList.add('hidden'),400));
</script>
